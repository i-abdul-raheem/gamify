<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Goal Quest" />
    <title>Todos • Goal Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="todos" data-auth="pending" data-ui="loading">
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
    <main class="app-shell">
      <section class="phone-frame">
        <div class="phone-glow"></div>
        <div class="app-content">
          <header class="topbar">
            <div class="topbar-brand">
              <p class="eyebrow">Goal Quest</p>
              <h2>Todos</h2>
            </div>
            <button
              id="topbarMenuButton"
              class="topbar-menu-button"
              type="button"
              aria-expanded="false"
              aria-controls="topbarActions"
              aria-label="Open menu"
            >
              <span></span>
              <span></span>
              <span></span>
            </button>
            <div id="topbarActions" class="topbar-actions">
              <a class="topbar-link" href="/quests">All Quests</a>
              <div id="authSlot" class="auth-slot"></div>
            </div>
          </header>

          <section class="hero-card panel-first">
            <div class="hero-copy">
              <p class="eyebrow">Focus Module</p>
              <h1>Keep quick tasks out of your head.</h1>
              <p class="hero-text">Use the todo tab for fast captures while your bigger goals stay organized as quests.</p>
            </div>
          </section>

          <section class="panel panel-featured">
            <div class="panel-heading">
              <div>
                <p class="section-label">New Todo</p>
                <h2>Add a quick task</h2>
              </div>
              <span class="pill">Lightweight</span>
            </div>
            <form id="todoForm" class="todo-form">
              <label>
                <span>Todo</span>
                <input name="todoTitle" type="text" placeholder="Reply to the design review" required />
              </label>
              <button type="submit" class="primary-button">Add Todo</button>
            </form>
          </section>

          <section class="stats-grid todo-summary" id="todoSummary"></section>

          <section class="panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">Todo Board</p>
                <h2>What still needs attention</h2>
              </div>
            </div>
            <div id="todoList" class="todo-list"></div>
          </section>
        </div>

        <nav class="tabbar">
          <a class="tabbar-link" href="/">Home</a>
          <a class="tabbar-link" href="/create">Create</a>
          <a class="tabbar-link" href="/quests">Quests</a>
          <a class="tabbar-link is-active" href="/todos">Todos</a>
        </nav>

        <div class="auth-loading" id="authLoading">
          <div class="auth-loading-mark"></div>
          <p>Loading Goal Quest...</p>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
