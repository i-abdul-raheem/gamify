<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Goal Quest" />
    <title>Goal Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="home" data-auth="pending" data-ui="loading">
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
    <main class="app-shell">
      <section class="phone-frame">
        <div class="phone-glow"></div>

        <div class="app-content">
          <header id="topbar" class="topbar">
            <div id="topbarBrand" class="topbar-brand"></div>
            <button
              id="topbarMenuButton"
              class="topbar-menu-button"
              type="button"
              aria-expanded="false"
              aria-controls="topbarActions"
              aria-label="Open menu"
            >
              <span></span>
              <span></span>
              <span></span>
            </button>
            <div id="topbarActions" class="topbar-actions"></div>
          </header>

          <div id="viewRoot"></div>
        </div>

        <nav id="tabbar" class="tabbar"></nav>

        <div class="auth-loading" id="authLoading">
          <div class="auth-loading-mark"></div>
          <p>Loading Goal Quest...</p>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
